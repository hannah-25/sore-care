<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SORE CARE</title>
  <link rel="icon" href="assets/mascot.ico">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
    }

    :root {
      --bg: #f4f7fa;
      --panel: #ffffff;
      --panel-soft: #eef5f9;
      --line: #d9e2ea;
      --text: #263f58;
      --muted: #65798c;
      --primary: #526a82;
      --primary-dark: #384d60;
      --result: #374d5d;
      --d: #e8f3ff;
      --e: #fff4d8;
      --n: #efeaff;
      --off: #eef2f5;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: "Segoe UI", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      font-size: 15px;
      letter-spacing: 0;
    }

    button, textarea, input {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
      border-radius: 7px;
      transition: background 0.15s ease, color 0.15s ease, transform 0.12s ease;
    }

    button:active {
      transform: translateY(1px);
    }

    .page {
      width: min(1180px, calc(100vw - 48px));
      margin: 8px auto 28px;
    }

    .hero {
      padding: 24px 32px;
      border: 1px solid var(--line);
      border-radius: 11px;
      background: var(--panel-soft);
      display: flex;
      align-items: center;
      gap: 28px;
    }

    .hero-brand {
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex-shrink: 0;
    }

    .brand {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      color: #2c3e50;
    }

    .hero-art {
      display: flex;
      align-items: center;
      flex-shrink: 0;
    }

    .hero-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
      margin-left: auto;
      flex-shrink: 0;
    }

    .brand-mark {
      position: relative;
      width: 28px;
      height: 24px;
      flex: 0 0 auto;
      margin-top: 2px;
    }

    .brand-mark::before {
      content: "";
      position: absolute;
      left: 1px;
      top: 0;
      width: 25px;
      height: 5px;
      border-top: 4px solid #8aa1b7;
      border-left: 4px solid #8aa1b7;
      border-right: 4px solid #8aa1b7;
    }

    .brand-mark::after {
      content: "";
      position: absolute;
      left: 10px;
      top: 7px;
      width: 7px;
      height: 17px;
      border-left: 4px solid #b9cad8;
      border-right: 4px solid #dce8f0;
    }

    .brand-name {
      font-size: 13px;
      line-height: 1;
      letter-spacing: 6px;
      color: #333d46;
    }

    .brand-sub {
      margin-top: 6px;
      font-size: 10px;
      letter-spacing: 5px;
      color: #5f6d79;
    }

    h1 {
      margin: 0;
      font-size: clamp(26px, 3.5vw, 40px);
      line-height: 1;
      color: #34536f;
      white-space: nowrap;
    }

    .hero-art img {
      width: 160px;
      max-width: 100%;
      display: block;
    }

    .panel {
      margin-top: 16px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 9px;
      box-shadow: 0 1px 2px rgba(42, 64, 82, 0.03);
      overflow: hidden;
    }

    .toolbar {
      min-height: 64px;
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 14px 16px;
      flex-wrap: wrap;
    }

    .toolbar-spacer {
      flex: 1 1 auto;
    }

    .toolbar-label {
      display: block;
      margin-bottom: 6px;
      color: #274666;
      font-size: 12px;
      font-weight: 800;
    }

    .date-control {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
    }

    .date-control-row {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .btn-primary,
    .btn-header {
      background: var(--primary);
      color: #fff;
      padding: 10px 17px;
      font-weight: 700;
      font-size: 13px;
    }

    .btn-primary:hover,
    .btn-header:hover {
      background: var(--primary-dark);
    }

    .btn-light {
      background: #fff;
      color: #142b3d;
      padding: 10px 14px;
      font-weight: 700;
      font-size: 13px;
      border: 1px solid transparent;
    }

    .btn-light:hover {
      background: #edf3f7;
      border-color: var(--line);
    }

    .btn-ghost {
      background: #edf3f7;
      color: #274666;
      padding: 10px 14px;
      font-weight: 700;
      font-size: 13px;
    }

    .stats,
    .date-range {
      color: #1f3a52;
      font-size: 13px;
      font-weight: 700;
    }

    .date-input {
      width: 84px;
      height: 38px;
      border: 1px solid var(--line);
      border-radius: 7px;
      padding: 0 10px;
      color: #1f3a52;
      font-weight: 700;
      background: #fff;
    }

    .section-title,
    .collapsible-header {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--line);
      color: #274666;
      font-weight: 800;
      background: #f9fbfc;
      text-align: left;
    }

    .collapsible-header {
      cursor: pointer;
    }

    .section-body {
      padding: 16px;
    }

    .schedule-grid {
      overflow: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    th,
    td {
      border: 1px solid var(--line);
      padding: 9px 10px;
      text-align: center;
      white-space: nowrap;
    }

    th {
      background: #f5f8fb;
      color: #274666;
      font-weight: 800;
    }

    td.name-cell {
      text-align: left;
      font-weight: 700;
      color: #274666;
      background: #fbfdfe;
    }

    .shift-D { background: var(--d); }
    .shift-E { background: var(--e); }
    .shift-N { background: var(--n); }
    .shift-off { background: var(--off); color: #7d8b98; }
    .selected-cell {
      outline: 2px solid rgba(82, 106, 130, 0.45);
      outline-offset: -2px;
      font-weight: 800;
    }

    .result-table {
      margin-top: 16px;
    }

    .sequence-panel {
      padding: 18px;
      background: #fff;
    }

    .sequence-card {
      width: min(520px, 100%);
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfdfe;
      overflow: hidden;
      border-left-width: 7px;
      display: flex;
    }

    .sequence-card.cells-1 { border-left-color: #7ecdc0; }
    .sequence-card.cells-2 { border-left-color: #f4a8bc; }
    .sequence-card.cells-3 { border-left-color: #e8c96a; }

    .shift-strip {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 52px;
      flex-shrink: 0;
      font-size: 26px;
      font-weight: 900;
      letter-spacing: 0;
      color: #8fa8be;
      border-right: 1px solid var(--line);
    }

    .sequence-card-content {
      flex: 1;
      min-width: 0;
    }



    .sequence-card-body {
      padding: 18px 15px 16px;
    }

    .sequence-meta {
      margin: 0 0 18px;
      color: #526a82;
      font-size: 14px;
      font-weight: 800;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .cell-count-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 3px 11px;
      border-radius: 20px;
      font-size: 15px;
      font-weight: 900;
      letter-spacing: 0;
      line-height: 1.4;
    }

    .cell-count-1 {
      background: #c6ede9;
      color: #2e8a7f;
    }

    .cell-count-2 {
      background: #fad4e0;
      color: #b54d70;
    }

    .cell-count-3 {
      background: #f7e9b0;
      color: #8a6a00;
    }

    .sequence-date {
      margin: 0 0 6px;
      color: #526a82;
      font-size: 18px;
      font-weight: 800;
      line-height: 1.4;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .sequence-name {
      min-height: 44px;
      margin: 0 0 18px;
      color: #102d45;
      font-size: 24px;
      line-height: 1.2;
      font-weight: 800;
    }

    .sequence-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .sequence-actions button:disabled {
      cursor: not-allowed;
      opacity: 0.48;
    }

    .copy-feedback {
      min-height: 20px;
      margin-top: 10px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .modal {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(25, 42, 56, 0.42);
    }

    .modal.open {
      display: flex;
    }

    .modal-card {
      width: min(780px, 100%);
      max-height: min(860px, calc(100vh - 48px));
      display: flex;
      flex-direction: column;
      border: 1px solid var(--line);
      border-radius: 11px;
      background: #fff;
      overflow: hidden;
      box-shadow: 0 24px 60px rgba(23, 42, 58, 0.24);
    }

    .modal-head {
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
      background: #f9fbfc;
    }

    .modal-head h2 {
      margin: 0;
      color: #274666;
      font-size: 18px;
      line-height: 1.2;
    }

    .modal-body {
      padding: 16px 18px;
      overflow: auto;
    }

    .input-guide {
      margin: 0 0 10px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
      line-height: 1.5;
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      padding: 14px 18px;
      border-top: 1px solid var(--line);
      background: #fbfdfe;
    }

    .textarea,
    .setting-textarea {
      width: 100%;
      min-height: 230px;
      padding: 13px 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      resize: vertical;
      color: #001b31;
      background: #fff;
      font-family: "Consolas", "D2Coding", monospace;
      font-size: 13px;
      line-height: 1.7;
    }

    .setting-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    .field-label {
      display: block;
      margin-bottom: 8px;
      color: #274666;
      font-weight: 800;
      font-size: 13px;
    }

    .setting-textarea {
      min-height: 210px;
    }

    .modal-feedback {
      flex: 1 1 auto;
      margin: 0;
      color: #c0392b;
      font-size: 13px;
      font-weight: 700;
    }

    .footer {
      padding: 38px 0 28px;
      text-align: center;
      color: #5c7082;
      font-size: 12px;
    }

    @media (max-width: 820px) {
      .page {
        width: min(100% - 24px, 1180px);
      }

      .hero {
        padding: 20px;
        gap: 20px;
      }

      .hero-art img {
        width: 120px;
      }

      .setting-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 560px) {
      .hero {
        flex-wrap: wrap;
        gap: 16px;
      }

      .hero-actions {
        margin-left: 0;
        width: 100%;
        justify-content: flex-end;
        order: -1;
      }

      .btn-header,
      .btn-ghost {
        padding: 7px 10px;
        font-size: 12px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero" aria-label="SORE CARE">
      <div class="hero-brand">
        <div class="brand" aria-label="TRINITY 트리니티 병원">
          <span class="brand-mark" aria-hidden="true"></span>
          <div>
            <div class="brand-name">TRINITY</div>
            <div class="brand-sub">트리니티 병원</div>
          </div>
        </div>
        <h1>SORE CARE</h1>
      </div>
      <div class="hero-art" aria-hidden="true">
        <img src="assets/lab-mascot.png" alt="">
      </div>
      <div class="hero-actions">
        <button class="btn-header" id="open-schedule" type="button">근무표 입력</button>
        <button class="btn-ghost" id="open-settings" type="button">설정</button>
      </div>
    </section>

    <section class="panel">
      <div class="toolbar">
        <div class="date-control">
          <span class="toolbar-label">시작일 입력</span>
          <div class="date-control-row">
            <input class="date-input" id="start-date-input" type="text" value="" placeholder="6/13" aria-label="시작일">
            <button class="btn-primary" id="apply-date" type="button">적용</button>
            <span class="date-range" id="date-range-display">-</span>
          </div>
        </div>
      </div>
    </section>

    <section class="panel">
      <button class="collapsible-header" id="selection-toggle" type="button">
        <span>자동 선택 결과</span>
        <span id="selection-toggle-label">펼치기</span>
      </button>
      <div class="section-body schedule-grid" id="selection-body" style="display: none;">
        <div id="schedule-preview"></div>
      </div>
    </section>

    <section class="panel">
      <div class="section-title">순차 복사 모드</div>
      <div class="sequence-panel" id="sequence-panel"></div>
      <div style="padding: 0 18px 14px;">
        <div class="copy-feedback" id="copy-feedback"></div>
      </div>
    </section>

    <footer class="footer">© 2026 Hannah J · hannah.j.dev@gmail.com</footer>
  </main>

  <div class="modal" id="schedule-modal">
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="schedule-modal-title">
      <div class="modal-head">
        <h2 id="schedule-modal-title">근무표 입력</h2>
      </div>
      <div class="modal-body">
        <p class="input-guide">시작일부터 8일치 근무표를 JSON으로 입력합니다.</p>
        <textarea class="textarea" id="schedule-json" spellcheck="false" aria-label="근무표 JSON" placeholder='예: {"month":"2025-06","startDate":"2025-06-13","schedule":{"강진영":["D","D","D","off","off","off","off","off"]}}'></textarea>
      </div>
      <div class="modal-actions">
        <p class="modal-feedback" id="schedule-feedback"></p>
        <input type="file" id="import-file-input" accept=".json" style="display:none" aria-hidden="true">
        <button class="btn-light" id="import-schedule" type="button">파일 불러오기</button>
        <button class="btn-primary" id="save-schedule" type="button">저장</button>
      </div>
    </div>
  </div>

  <div class="modal" id="settings-modal">
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="settings-modal-title">
      <div class="modal-head">
        <h2 id="settings-modal-title">설정</h2>
      </div>
      <div class="modal-body setting-grid">
        <label>
          <span class="field-label">직원 목록</span>
          <textarea class="setting-textarea" id="staff-list" spellcheck="false"></textarea>
        </label>
        <label>
          <span class="field-label">제외 명단</span>
          <textarea class="setting-textarea" id="exclude-list" spellcheck="false"></textarea>
        </label>
        <label>
          <span class="field-label">후순위 명단</span>
          <textarea class="setting-textarea" id="low-priority-list" spellcheck="false"></textarea>
        </label>
      </div>
      <div class="modal-actions">
        <button class="btn-light" id="close-settings" type="button">닫기</button>
        <button class="btn-primary" id="save-settings" type="button">저장</button>
      </div>
    </div>
  </div>

  <script type="module" src="src/app.js"></script>
</body>
</html>
